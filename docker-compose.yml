version: '3.9'

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: taskflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend (Express + Node) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/taskflow
      JWT_SECRET: taskflow_jwt_secret_key_2024_change_in_prod
      JWT_EXPIRE: 7d
      FRONTEND_URL: http://localhost
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - taskflow-network

  # ── Frontend (React + Vite → Nginx) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - taskflow-network

# ── Volúmenes ─────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local

# ── Red compartida ────────────────────────────────────────────────────────────
networks:
  taskflow-network:
    driver: bridge
